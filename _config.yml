# GitHub Pages (Jekyll) configuration for the apd documentation site.
# Served from the repository root on the default branch: the README is the
# home page, and everything under docs/ and research/ is browsable. The
# jekyll-relative-links plugin (enabled by default on GitHub Pages) rewrites
# [text](file.md) links to their generated URLs, so the same links work in the
# GitHub repo view and on the published site.

title: apd — AAuth Agent Provider
description: >-
  A fast, dependency-light, self-hostable AAuth Agent Provider in Rust — the
  role that gives every AI agent a cryptographic identity.
theme: jekyll-theme-cayman
lang: en

plugins:
  - jekyll-relative-links
  - jekyll-readme-index
  - jekyll-seo-tag
  - jekyll-sitemap

relative_links:
  enabled: true
  collections: false

readme_index:
  with_frontmatter: true

# Keep the published site to prose only — don't render source, build, or
# licensing files as pages.
exclude:
  - Cargo.toml
  - Cargo.lock
  - crates/
  - target/
  - LICENSE-MIT
  - LICENSE-APACHE
  - Gemfile
  - Gemfile.lock
  - .gitignore
  - vendor/

# GitHub Pages sets `url`/`baseurl` automatically for project sites; leaving
# them unset lets the same config work for a user/org or project site.
