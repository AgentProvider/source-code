# GitHub Pages (Jekyll) configuration for agentprovider.dev.
# Custom design — no external theme. Markdown under docs/ and research/ renders
# through the `doc` layout; index.html is the landing page.

title: apd — AAuth Agent Provider
description: >-
  apd issues short-lived, signed cryptographic identities to AI agents — no API
  keys, no shared secrets. Self-hostable, multi-arch, verifiable by anyone.
lang: en
url: https://agentprovider.dev

plugins:
  - jekyll-relative-links
  - jekyll-seo-tag
  - jekyll-sitemap

relative_links:
  enabled: true
  collections: false

# Apply the docs chrome (nav + sidebar) to every rendered doc page.
defaults:
  - scope:
      path: "docs"
    values:
      layout: doc
  - scope:
      path: "research"
    values:
      layout: doc

# Keep the published site to the landing + prose docs. Everything below is
# source, build, or planning material.
exclude:
  - README.md
  - Cargo.toml
  - Cargo.lock
  - crates/
  - target/
  - charts/
  - Dockerfile
  - .dockerignore
  - .github/
  - LICENSE-MIT
  - LICENSE-APACHE
  - Gemfile
  - Gemfile.lock
  - .gitignore
  - vendor/
